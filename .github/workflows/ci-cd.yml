name: CI/CD — Procurement Management System

on:
  push:
    branches: [main, dev, dev-temp]
  pull_request:
    branches: [main]

  # MANUAL TRIGGER
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all services"
        required: true
        default: "false"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/procurement

jobs:
  # ─────────────────────────────────────────────────────────
  # DETECT CHANGES
  # ─────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      supplier: ${{ steps.filter.outputs.supplier }}
      pr: ${{ steps.filter.outputs.pr }}
      po: ${{ steps.filter.outputs.po }}
      approval: ${{ steps.filter.outputs.approval }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            eureka:
              - 'eureka-server/**'
            gateway:
              - 'api-gateway/**'
            user:
              - 'user-service/**'
            supplier:
              - 'supplier-service/**'
            pr:
              - 'pr-service/**'
            po:
              - 'po-service/**'
            approval:
              - 'approval-service/**'

  # ─────────────────────────────────────────────────────────
  # BUILD BACKEND
  # ─────────────────────────────────────────────────────────
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: detect-changes

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build, Test & Sonar Scan
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=RakinduM_Procurement-Management-System \
            -Dsonar.organization=rakindum \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.PROCUREMENT }}

  # ─────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

  # ─────────────────────────────────────────────────────────
  # DOCKER BUILD
  # ─────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, detect-changes]

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        include:
          - service: eureka-server
            key: eureka
          - service: api-gateway
            key: gateway
          - service: user-service
            key: user
          - service: supplier-service
            key: supplier
          - service: pr-service
            key: pr
          - service: po-service
            key: po
          - service: approval-service
            key: approval

    steps:
      - uses: actions/checkout@v4

      # 🔥 SKIP LOGIC
      - name: Skip if no changes (unless force deploy)
        if: github.event.inputs.deploy_all != 'true' && needs.detect-changes.outputs[matrix.key] != 'true'
        run: |
          echo "Skipping ${{ matrix.service }}"
          exit 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────────────────────
  # DEPLOY
  # ─────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build-push, detect-changes]

    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      # EUREKA
      - name: Deploy Eureka
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.eureka == 'true'
        run: |
          aws ecs update-service --cluster procurement-cluster --service eureka-server --force-new-deployment
          aws ecs wait services-stable --cluster procurement-cluster --services eureka-server

      # MICROSERVICES
      - name: Deploy user-service
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.user == 'true'
        run: aws ecs update-service --cluster procurement-cluster --service user-service --force-new-deployment

      - name: Deploy supplier-service
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.supplier == 'true'
        run: aws ecs update-service --cluster procurement-cluster --service supplier-service --force-new-deployment

      - name: Deploy pr-service
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.pr == 'true'
        run: aws ecs update-service --cluster procurement-cluster --service pr-service --force-new-deployment

      - name: Deploy po-service
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.po == 'true'
        run: aws ecs update-service --cluster procurement-cluster --service po-service --force-new-deployment

      - name: Deploy approval-service
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.approval == 'true'
        run: aws ecs update-service --cluster procurement-cluster --service approval-service --force-new-deployment

      # WAIT
      - name: Wait for services
        run: |
          aws ecs wait services-stable --cluster procurement-cluster \
          --services user-service supplier-service pr-service po-service approval-service || true

      # API GATEWAY LAST
      - name: Deploy API Gateway
        if: github.event.inputs.deploy_all == 'true' || needs.detect-changes.outputs.gateway == 'true'
        run: |
          aws ecs update-service --cluster procurement-cluster --service api-gateway --force-new-deployment
          aws ecs wait services-stable --cluster procurement-cluster --services api-gateway