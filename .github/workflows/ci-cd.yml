name: CI/CD — Procurement Management System

on:
  push:
    branches: [main, dev, dev-temp]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/procurement

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test — Backend (Maven multi-module)
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build, Test & Sonar Scan
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=RakinduM_Procurement-Management-System \
            -Dsonar.organization=rakindum \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.PROCUREMENT }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            */target/*.jar
            !**/original-*.jar
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Test — Frontend (Node/Vite)
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Docker Build & Push (only on push to main or dev)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            dockerfile: eureka-server/Dockerfile
            context: .
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            context: .
          - service: user-service
            dockerfile: user-service/Dockerfile
            context: .
          - service: supplier-service
            dockerfile: supplier-service/Dockerfile
            context: .
          - service: pr-service
            dockerfile: pr-service/Dockerfile
            context: .
          - service: po-service
            dockerfile: po-service/Dockerfile
            context: .
          - service: approval-service
            dockerfile: approval-service/Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # DOCKER SETUP
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # LOGIN GHCR (EXISTING)
      # -----------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # LOGIN AWS ECR (NEW 🔥)
      # -----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # -----------------------------
      # IMAGE TAGS
      # -----------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # -----------------------------
      # BUILD & PUSH (BOTH GHCR + ECR)
      # -----------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to AWS ECS (ordered: Eureka ➡ Services ➡ API Gateway)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: "Step 1 — Deploy Eureka Server first"
        run: |
          aws ecs update-service --cluster procurement-cluster --service eureka-server --force-new-deployment
          echo "Waiting for Eureka to stabilize..."
          aws ecs wait services-stable --cluster procurement-cluster --services eureka-server
          echo "Eureka Server is stable!"

      - name: "Step 2 — Deploy all Microservices in parallel"
        run: |
          aws ecs update-service --cluster procurement-cluster --service user-service --force-new-deployment
          aws ecs update-service --cluster procurement-cluster --service supplier-service --force-new-deployment
          aws ecs update-service --cluster procurement-cluster --service pr-service --force-new-deployment
          aws ecs update-service --cluster procurement-cluster --service po-service --force-new-deployment
          aws ecs update-service --cluster procurement-cluster --service approval-service --force-new-deployment
          echo "Waiting for microservices to stabilize..."
          aws ecs wait services-stable --cluster procurement-cluster --services user-service supplier-service pr-service po-service approval-service
          echo "All microservices are stable!"

      - name: "Step 3 — Deploy API Gateway last"
        run: |
          aws ecs update-service --cluster procurement-cluster --service api-gateway --force-new-deployment
          echo "Waiting for API Gateway to stabilize..."
          aws ecs wait services-stable --cluster procurement-cluster --services api-gateway
          echo "API Gateway is live! Deployment complete."
